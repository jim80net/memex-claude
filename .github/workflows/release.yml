name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            bun-target: bun-linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            bun-target: bun-linux-arm64
          - os: macos-latest
            platform: darwin-arm64
            bun-target: bun-darwin-arm64
          - os: windows-latest
            platform: win32-x64
            bun-target: bun-windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build binary
        run: bun run build.ts --target ${{ matrix.bun-target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -czf memex-${{ matrix.platform }}.tar.gz -C dist/${{ matrix.platform }} .

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/${{ matrix.platform }}/* -DestinationPath memex-${{ matrix.platform }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: memex-${{ matrix.platform }}
          path: memex-${{ matrix.platform }}.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" artifacts/* --repo "${{ github.repository }}"
